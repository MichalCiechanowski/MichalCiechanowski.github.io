<digital-clock style="--clr-neon: #B76CFD;"></digital-clock>
<neon-button routerLink="/Home" class="Go_back" content="Menu" style="--clr-neon: white;font-size: 3rem;"></neon-button>

<div class="content">
  <div class="boards">

    <div class="score-board">
      <h2>You</h2>
      <button mat-fab color="primary" class="score">{{ scores[0] }}</button>
    </div>
    <div class="score-board">
      <h2> Computer</h2>
      <button mat-fab class="score">{{ scores[1] }}</button>

    </div>
  </div>
  <div class="user">
    <h3 class="motivation"> Choose your weapon: </h3>
    <div class="users-weapons">
      <i (click)="pick(0)" [ngClass]="{'selectedWeapon':(playerSelected === 0)}">ROCK</i>
      <i (click)="pick(1)" [ngClass]="{'selectedWeapon':(playerSelected === 1)}">PAPER</i>
      <i (click)="pick(2)" [ngClass]="{'selectedWeapon':(playerSelected === 2)}">SCISSORS</i>
    </div>
  </div>

  <div>
    <div>



      <div *ngIf="enemySelected !== -1" class="flex-container flex-center enemy-hand">
        <i *ngIf="enemySelected === 0" class="fa fa-hand-rock-o"></i>
        <i *ngIf="enemySelected === 1" class="fa fa-hand-paper-o"></i>
        <i *ngIf="enemySelected === 2" class="fa fa-hand-scissors-o"></i>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && isResultShow" class="flex-container flex-center" style="flex-direction: column">
    <div [ngSwitch]="theResult">
      <ng-template [ngSwitchCase]="0">
        <h1> You're the winner! </h1>
      </ng-template>
      <ng-template [ngSwitchCase]="1">
        <h1> You lose. </h1>
      </ng-template>
      <ng-template [ngSwitchCase]="2">
        <h1>It's a tie! </h1>
      </ng-template>
      <ng-template ngSwitchDefault> </ng-template>
    </div>
    <p> Pick again to continue or </p>
    <button (click)="reset()" class="reset" mat-raised-button> Reset score</button>
  </div>

  <div class="flex-container flex-center" *ngIf="loading">
    <mat-spinner></mat-spinner>
  </div>

</div>
