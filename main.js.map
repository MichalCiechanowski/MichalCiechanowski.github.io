<digital-clock style="--clr-neon: #B76CFD;"></digital-clock>
<neon-button routerLink="/Home" class="Go_back" content="Menu" style="--clr-neon: white;font-size: 3rem;"></neon-button>
<div class="container">
  <h2>Guess the Number !</h2>
  <div class="card bg-light mb-3">
    <div class="card-body">
      <p class="card-text">Guess the computer generated random number between 1 and 10</p>
    </div>
  </div>
  <div class="input">
    <label>Your Guess: </label>
    <input [value]="guess" (input)="guess = $event.target.value" />
    <button (click)="verifyGuess()" class="btn btn-primary btn-sm">Verify</button>
    <button (click)="initializeGame()" class="btn btn-warning btn-sm">Restart</button>
  </div>
  <div>
    <p *ngIf="deviation<0" class="alert alert-warning">Your guess is higher.</p>
    <p *ngIf="deviation>0" class="alert alert-warning">Your guess is lower.</p>
    <p *ngIf="deviation===0" class="alert alert-success">Yes! That's it.</p>
  </div>
  <p class="text-info">Number of guesses :
    <span class="badge">{{noOfTries}}</span>
  </p>
